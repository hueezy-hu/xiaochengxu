document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8.5 C19.3 4 20 4.7 20 5.5 V8 M20 16 V18.5 C20 19.3 19.3 20 18.5 20 H16 M8 20 H5.5 C4.7 20 4 19.3 4 18.5 V16 M4 12 H20\" stroke=\"#E9F2EA\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>扫码核销<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ fillDemo }}\" style=\"font-size:11px;color:#8FA491;text-align:center;margin-top:10px;cursor:pointer;\">原型演示：点这里自动填入 638274<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- 成功反馈 -->\n          <sc-if value=\"{{ verified }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"flex:none;background:rgba(123,201,111,.12);border:1.5px solid rgba(123,201,111,.5);border-radius:20px;padding:16px;display:flex;align-items:center;gap:14px;animation:pop .45s ease both;\">\n              <div style=\"width:52px;height:52px;flex:none;border-radius:50%;background:#7BC96F;display:flex;align-items:center;justify-content:center;\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\"><path d=\"M4 12.5 L9.5 18 L20 6.5\" stroke=\"#161D18\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1;\"><div style=\"font-size:17px;font-weight:800;color:#B9F0A8;\">核销成功！<\u002Fdiv><div style=\"font-size:12px;color:#8FA491;margin-top:3px;\">638274 · 米米酱 · 斑斓蛋糕 6寸 × 1<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <!-- 本场进度 -->\n          <div style=\"flex:none;background:#202A22;border-radius:20px;padding:16px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;\">\n              <span style=\"font-size:14px;font-weight:800;color:#E9F2EA;\">本场进度<\u002Fspan>\n              <span style=\"font-size:18px;font-weight:800;color:#7BC96F;\">{{ progDone }}<span style=\"font-size:12px;color:#8FA491;font-weight:700;\"> / 21 单<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px;\"><div style=\"{{ progBar }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <!-- 待核销列表 -->\n          <div style=\"flex:none;font-size:12px;font-weight:800;color:#8FA491;letter-spacing:1px;padding-left:2px;\">待核销<\u002Fdiv>\n          <div style=\"flex:none;background:#202A22;border-radius:18px;padding:6px 14px;\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);\">\n              <span style=\"font-size:14px;font-weight:800;color:{{ firstCodeColor }};letter-spacing:2px;\">638274<\u002Fspan>\n              <span style=\"flex:1;font-size:12px;color:#B9C8BB;\">斑斓蛋糕 6寸 × 1 · 米米酱<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:800;color:{{ firstTagColor }};\">{{ firstTag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);\">\n              <span style=\"font-size:14px;font-weight:800;color:#E9F2EA;letter-spacing:2px;\">204915<\u002Fspan>\n              <span style=\"flex:1;font-size:12px;color:#B9C8BB;\">斑斓蛋糕 8寸 × 1 · 豆豆<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:800;color:#F0A85C;\">待核销<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);\">\n              <span style=\"font-size:14px;font-weight:800;color:#E9F2EA;letter-spacing:2px;\">771308<\u002Fspan>\n              <span style=\"flex:1;font-size:12px;color:#B9C8BB;\">椰子小方 × 3 · 阿乐（帮室友代买）<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:800;color:#F0A85C;\">待核销<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;\">\n              <span style=\"font-size:14px;font-weight:800;color:#5E6E61;letter-spacing:2px;\">592047<\u002Fspan>\n              <span style=\"flex:1;font-size:12px;color:#5E6E61;\">斑斓蛋糕 6寸 × 2 · 小婉<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:800;color:#5E6E61;\">已核销<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;adminVisible&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;角色演示&quot;},&quot;defaultStation&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;车公庙站&quot;,&quot;深圳北站&quot;],&quot;default&quot;:&quot;车公庙站&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;角色演示&quot;},&quot;founderPreview&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;角色演示&quot;}}\">\nclass Component extends DCLogic {\n  state = { sku: '6', qty: 1, station: null, notify: false, toastShow: false, code: '', verified: false, errShow: false };\n\n  renderVals() {\n    const s = this.state;\n    const price = s.sku === '6' ? 88 : 128;\n    const total = price * s.qty;\n    const stationKey = s.station || ((this.props.defaultStation ?? '车公庙站') === '深圳北站' ? 'szb' : 'cgm');\n    const selName = stationKey === 'szb' ? '深圳北站' : (stationKey === 'kjy' ? '科技园站' : '车公庙站');\n    const founder = stationKey === 'kjy' || (this.props.founderPreview ?? false);\n    const goal = 4;\n    const cur = founder ? 1 : (stationKey === 'szb' ? 5 : 3);\n    const remain = Math.max(goal - cur, 0);\n    const fillPct = Math.min(cur / goal * 100, 100);\n\n    const skuBase = {\n      flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'flex-start',\n      padding: '12px 14px', borderRadius: 14, cursor: 'pointer'\n    };\n    const skuOn = { ...skuBase, border: '2px solid #3E8E5E', background: '#EDF7EC', color: '#2C6B47', boxShadow: '0 4px 12px rgba(62,142,94,.15)' };\n    const skuOff = { ...skuBase, border: '2px solid #EAE4D6', background: '#FFFFFF', color: '#57614F' };\n\n    const cardBase = { flex: 'none', background: '#FFFFFF', borderRadius: 20, padding: 16, cursor: 'pointer' };\n    const cardOn = { ...cardBase, border: '2px solid #3E8E5E', boxShadow: '0 8px 20px rgba(62,142,94,.18)' };\n    const cardOff = { ...cardBase, border: '2px solid transparent', boxShadow: '0 4px 14px rgba(40,60,45,.06)' };\n\n    const dotBase = { width: 24, height: 24, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none' };\n    const dotOn = { ...dotBase, background: '#3E8E5E' };\n    const dotOff = { ...dotBase, background: '#FFFFFF', border: '2px solid #D8D0BC', boxSizing: 'border-box' };\n\n    const progDone = s.verified ? 9 : 8;\n\n    return {\n      qty: s.qty,\n      price: price,\n      total: total,\n      skuName: s.sku === '6' ? '6寸' : '8寸',\n      stockNote: s.sku === '6' ? '剩 9 份' : '仅剩 3 份',\n      selName: selName,\n      sku6Style: s.sku === '6' ? skuOn : skuOff,\n      sku8Style: s.sku === '8' ? skuOn : skuOff,\n      minusStyle: {\n        width: 36, height: 36, borderRadius: 12, fontSize: 20, fontWeight: 700,\n        display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',\n        background: s.qty > 1 ? '#EDF7EC' : '#F5F1E6', color: s.qty > 1 ? '#2C6B47' : '#C9C2AE'\n      },\n      cgmStyle: stationKey === 'cgm' ? cardOn : cardOff,\n      szbStyle: stationKey === 'szb' ? cardOn : cardOff,\n      kjyStyle: stationKey === 'kjy' ? cardOn : cardOff,\n      cgmDot: stationKey === 'cgm' ? dotOn : dotOff,\n      szbDot: stationKey === 'szb' ? dotOn : dotOff,\n      kjyDot: stationKey === 'kjy' ? dotOn : dotOff,\n      founderShow: founder,\n      successTitle: founder ? '团开起来了，你是发起人！' : '支付成功！',\n      successSub: founder ? ('你在 ' + selName + ' 开了新团 · 斑斓蛋糕 ' + (s.sku === '6' ? '6寸' : '8寸') + ' × ' + s.qty) : ('已加入 ' + selName + ' 的团 · 斑斓蛋糕 ' + (s.sku === '6' ? '6寸' : '8寸') + ' × ' + s.qty),\n      progHead: selName + ' · 已拼 ' + cur + '/' + goal + ' 份',\n      progRemain: remain > 0 ? ('还差 ' + remain + ' 份') : '已成团',\n      progFill: { width: fillPct + '%', height: '100%', borderRadius: 999, background: fillPct >= 100 ? '#3E8E5E' : '#7BC96F' },\n      calloutTitle: founder ? ('你开的团，还差 ' + remain + ' 份，喊人的时候到了！') : (remain > 0 ? ('还差 ' + remain + ' 份，喊人的时候到了！') : '已成团，坐等自提！'),\n      calloutSub: founder ? '把团发出去，第一波人拼齐就成团，大家一起在地铁站拿蛋糕' : '发到室友群、同事群，人齐了大家一起在地铁站拿蛋糕',\n      shareBtnText: founder ? '把团发出去 · 喊人来拼' : '分享到微信群',\n      payBtnText: founder ? '发起拼团 · 当第一个' : '微信支付',\n      shareLine: founder ? ('\"我在 ' + selName + ' 开了个斑斓蛋糕团，还差' + remain + '份成团，今天拼明天取、下班地铁口顺手拿，取货日上午10点前可退，来拼一份呀～\"') : ('\"我在 ' + selName + ' 拼了个斑斓蛋糕，还差' + remain + '份成团，今天拼明天取、下班地铁口顺手拿～\"'),\n      pickSku6: () => this.setState({ sku: '6' }),\n      pickSku8: () => this.setState({ sku: '8' }),\n      inc: () => this.setState(st => ({ qty: Math.min(st.qty + 1, 9) })),\n      dec: () => this.setState(st => ({ qty: Math.max(st.qty - 1, 1) })),\n      pickCgm: () => this.setState({ station: 'cgm' }),\n      pickSzb: () => this.setState({ station: 'szb' }),\n      pickKjy: () => this.setState({ station: 'kjy' }),\n      toastShow: s.toastShow,\n      copyText: () => {\n        this.setState({ toastShow: true });\n        clearTimeout(this._tt);\n        this._tt = setTimeout(() => this.setState({ toastShow: false }), 1800);\n      },\n      notifyTitle: s.notify ? '已开启自提通知' : '开启自提通知',\n      notifyTrack: {\n        width: 46, height: 27, borderRadius: 999, padding: 3, boxSizing: 'border-box',\n        display: 'flex', justifyContent: s.notify ? 'flex-end' : 'flex-start',\n        background: s.notify ? '#3E8E5E' : '#E2D8BE', flex: 'none', transition: 'background .2s'\n      },\n      notifyKnob: { width: 21, height: 21, borderRadius: '50%', background: '#FFFFFF', boxShadow: '0 1px 3px rgba(0,0,0,.2)' },\n      toggleNotify: () => this.setState(st => ({ notify: !st.notify })),\n      adminOn: this.props.adminVisible ?? true,\n      code: s.code,\n      onCode: (e) => this.setState({ code: e.target.value.replace(/\\D/g, '').slice(0, 6), errShow: false }),\n      fillDemo: () => this.setState({ code: '638274', errShow: false }),\n      onVerify: () => {\n        if (this.state.code === '638274') {\n          this.setState({ verified: true, errShow: false });\n        } else {\n          this.setState({ errShow: true, verified: false });\n        }\n      },\n      verified: s.verified,\n      errShow: s.errShow,\n      verifyBtnStyle: {\n        flex: 1.2, height: 48, borderRadius: 999, fontSize: 15, fontWeight: 800, cursor: 'pointer',\n        display: 'flex', alignItems: 'center', justifyContent: 'center',\n        background: s.code.length === 6 ? '#7BC96F' : 'rgba(123,201,111,.25)',\n        color: s.code.length === 6 ? '#161D18' : 'rgba(233,242,234,.5)'\n      },\n      progDone: progDone,\n      progBar: { width: (progDone / 21 * 100) + '%', height: '100%', borderRadius: 999, background: '#7BC96F', transition: 'width .4s' },\n      firstCodeColor: s.verified ? '#5E6E61' : '#B9F0A8',\n      firstTagColor: s.verified ? '#5E6E61' : '#7BC96F',\n      firstTag: s.verified ? '已核销' : '刚才在门口 · 优先'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
